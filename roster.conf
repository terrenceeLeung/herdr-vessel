# herdr-vessel 花名册：角色 → 模型
# team-up.sh 读这个文件启动角色 pane。
#
# 每行: <role> <model>        （# 开头为注释，空行忽略）
#
# role  必须存在于 role-packs/<role>/ 目录。
# model 语法同 pi --model：模型名或 provider/id，可带 :<thinking> 档位。
#       写 - 表示不指定（用 pi 默认模型）。
#
# 示例:
#   first-mate      anthropic/claude-sonnet-4-5
#   chief-engineer  anthropic/claude-opus-4-5:high
#   reviewer        openai/gpt-5-codex
#
# 角色运行中也可以在 pane 里用 /model 临时切换；本文件管的是启动默认值。

first-mate      openai-codex/gpt-5.6-sol
chief-engineer  kimi-coding/k3
reviewer        openai-codex/gpt-5.6-sol
